<!DOCTYPE html><script type="application/json" id="cowork-artifact-meta">
{
  "name": "Martin Bauer Job Board",
  "schemaVersion": 1,
  "description": "Dr. Martin Bauer's daily job scan â verified live listings only. Pharma/biotech/medtech in-house legal roles, Munich & hybrid. Updated automatically each scan run."
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Martin Bauer â Job Board</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f9f9f8;
    color: #1a1a1a;
    padding: 24px 20px 48px;
    min-height: 100vh;
  }
  .header { margin-bottom: 28px; }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 6px;
  }
  .title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; color: #111; }
  .last-scan {
    font-size: 12px; color: #888; background: #f0f0ee;
    padding: 4px 10px; border-radius: 20px;
  }
  .subtitle { font-size: 13px; color: #888; }

  .stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    background: #fff; border: 1px solid #e8e8e5;
    border-radius: 8px; padding: 8px 14px; font-size: 13px; color: #444;
  }
  .stat-pill strong { font-weight: 600; color: #111; }
  .dot-a { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .dot-b { width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; flex-shrink: 0; }
  .dot-c { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; }
  .dot-dead { width: 8px; height: 8px; border-radius: 50%; background: #e11d48; flex-shrink: 0; }
  .dot-all { width: 8px; height: 8px; border-radius: 50%; background: #a1a1aa; flex-shrink: 0; }

  .scan-notice {
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;
    padding: 10px 14px; font-size: 12px; color: #92400e; margin-bottom: 16px;
  }

  .filter-bar { display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #e0e0db;
    background: #fff; font-size: 12px; font-weight: 500; cursor: pointer;
    color: #555; transition: all 0.12s;
  }
  .filter-btn:hover { background: #f5f5f3; border-color: #ccc; }
  .filter-btn.active { background: #111; color: #fff; border-color: #111; }

  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.6px;
    text-transform: uppercase; color: #888; margin-bottom: 10px; margin-top: 24px;
  }

  .jobs-list { display: flex; flex-direction: column; gap: 10px; }

  .job-card {
    background: #fff; border: 1px solid #e8e8e5; border-radius: 10px;
    padding: 16px 18px; cursor: pointer; transition: all 0.12s;
    display: none;
  }
  .job-card:hover { border-color: #bbb; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .job-card.visible { display: block; }

  .job-header { display: flex; align-items: flex-start; gap: 12px; }
  .grade-badge {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; letter-spacing: 0.3px;
  }
  .grade-a { background: #dcfce7; color: #15803d; }
  .grade-b { background: #dbeafe; color: #1d4ed8; }
  .grade-c { background: #fef3c7; color: #b45309; }

  .job-meta { flex: 1; min-width: 0; }
  .job-title { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 3px; }
  .job-company { font-size: 13px; color: #555; margin-bottom: 6px; }
  .job-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: #f3f3f0; color: #666; border: 1px solid #e8e8e5;
  }
  .tag.dream { background: #fdf4ff; color: #7e22ce; border-color: #e9d5ff; }
  .tag.verified { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
  .tag.new { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
  .tag.stale { background: #fef2f2; color: #991b1b; border-color: #fecaca; }

  .job-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn-apply {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 6px;
    background: #111; color: #fff; font-size: 12px; font-weight: 600;
    text-decoration: none; border: none; cursor: pointer;
    transition: background 0.12s;
  }
  .btn-apply.secondary {
    background: #fff; color: #333; border: 1px solid #e0e0db;
  }
  .btn-apply.secondary:hover { background: #f5f5f3; }

  .job-note {
    margin-top: 10px; font-size: 12px; color: #666;
    background: #fafaf8; border-radius: 6px; padding: 8px 12px;
    border-left: 3px solid #e8e8e5;
  }
  .job-note.blue { border-left-color: #3b82f6; }
  .job-note.green { border-left-color: #22c55e; }

  .dream-section { margin-top: 32px; }
  .dream-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px; margin-top: 12px;
  }
  .dream-card {
    background: #fff; border: 1px solid #e8e8e5; border-radius: 8px;
    padding: 10px 12px; font-size: 12px;
  }
  .dream-name { font-weight: 600; color: #111; margin-bottom: 3px; }
  .dream-status { color: #888; }
  .dream-status.active { color: #15803d; font-weight: 600; }
  .dream-status.dead { color: #e11d48; }
  .dream-status.none { color: #aaa; }

  .health-section { margin-top: 32px; }
  .health-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .health-table th {
    text-align: left; padding: 8px 12px; border-bottom: 1px solid #e8e8e5;
    font-weight: 600; color: #555; background: #fafaf8;
  }
  .health-table td { padding: 8px 12px; border-bottom: 1px solid #f0f0ee; color: #444; }
  .health-table tr:last-child td { border-bottom: none; }
  .check { color: #22c55e; } .cross { color: #e11d48; }

  .empty-state {
    text-align: center; padding: 40px 20px; color: #888; font-size: 14px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="title">Martin Bauer â Job Board</div>
    <span class="last-scan" id="lastScanBadge">Last scan: -</span>
  </div>
  <div class="subtitle">Verified in-house pharma/biotech/medtech legal roles Munich and hybrid Senior level only</div>
</div>

<div class="stats">
  <div class="stat-pill"><div class="dot-a"></div><strong id="cntA">0</strong> A-grade</div>
  <div class="stat-pill"><div class="dot-b"></div><strong id="cntB">0</strong> B-grade</div>
  <div class="stat-pill"><div class="dot-c"></div><strong id="cntC">0</strong> C-grade</div>
  <div class="stat-pill"><div class="dot-dead"></div><strong id="cntDead">0</strong> dead removed</div>
  <div class="stat-pill">Est. cost: <strong id="estCost">-</strong></div>
</div>

<div id="scanNotice" class="scan-notice" style="display:none"></div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterJobs('all',event)">All Verified</button>
  <button class="filter-btn" onclick="filterJobs('A',event)">A-Grade</button>
  <button class="filter-btn" onclick="filterJobs('B',event)">B-Grade</button>
  <button class="filter-btn" onclick="filterJobs('C',event)">C-Grade</button>
</div>

<div class="jobs-list" id="jobsList"></div>

<div class="dream-section">
  <div class="section-label">Dream Company Monitor</div>
  <div class="dream-grid" id="dreamGrid"></div>
</div>

<div class="health-section">
  <div class="section-label">Scraper Health Latest Scan</div>
  <table class="health-table">
    <thead><tr><th>Source</th><th>Queries</th><th>Raw</th><th>Scored</th><th>Verified</th><th>Dead</th><th>Notes</th></tr></thead>
    <tbody id="healthBody"></tbody>
  </table>
</div>

<script>
const SCAN_META = {
  lastScan: "2026-06-15",
  totalScraped: 303,
  passedVerification: 0,
  deadLinks: 3,
  estCostUSD: 2.10,
  noNewMatches: true,
  noMatchNote: "Quiet week \u2014 303 listings scraped across 7 sources + 13 WebSearches. 3 candidates scored (Ipsen DACH, Gilead \u00d72) but all 3 URLs confirmed dead again. Medtronic Meerbusch role also dead. No new verified A/B/C matches. Prior board listings from May scans remain valid.",
  sources: ["Glassdoor","LinkedIn","StepStone","Indeed","XING","Arbeitsagentur","Workday","WebSearch"]
};
const JOBS = [{id:"sandoz-2026-05-30",scanDate:"2026-05-30",grade:"B",title:"Senior Legal and Compliance Counsel",notes:"Pharma law + compliance + regulatory + litigation. Sandoz is the global biosimilars/generics leader spun off from Novartis. Holzkirchen is Sandoz DE HQ about 35km south of Munich.",company:"Sandoz",location:"Holzkirchen 35km from Munich",source:"Indeed and Glassdoor",url:"https://de.indeed.com/viewjob?jk=a707cc3cf798084e",hybrid:"On-site",dreamCompany:false,new:false,whyGrade:"Right industry pharma, right level, excellent practice area match. Minor location compromise."},{id:"wuxi-2026-05-31",scanDate:"2026-05-31",grade:"C",title:"Legal Counsel Commercial Contracts",notes:"WuXi AppTec is leading CDMO with European HQ in Munich. CONTRACT role, not permanent. Remote GerMany.",company:"WuXi AppTec",location:"Germany Remote",source:"LinkedIn",url:"https://www.linkedin.com/jobs/view/legal-counsel-commercial-contracts-at-wuxi-apptec-4408692569",hybrid:"Remote",dreamCompany:false,new:false,whyGrade:"Pharma CDMO context but contract role and not Munich specific."},{id:"careerwise-2026-05-30",scanDate:"2026-05-30",grade:"C",title:"Senior Legal Counsel Corporate EMEA",notes:"Senior Corporate Counsel reporting to GC EMEA. Undisclosed client mentions Munich or Oberhausen locations. Industry unclear.",company:"CareerWise Recruitment","location":"Munich",source:"LinkedIn",url:"https://de.linkedin.com/jobs/view/senior-legal-counsel-at-careerwise-recruitment-4418929719",hybrid:"On-site",dreamCompany:false,new:false,whyGrade:"Right seniority level Munich but industry unclear."}];
const DREAM_COMPANIES=[{name:"BioNTech",status:"none",role:"No legal openings 06-15"},{name:"Takeda",status:"none",erole:"No Germany legal 06-15"},{name:"Pfizer",status:"none",role:"No Germany legal 06-15"},{name:"Roche",status:"none",role:"No Germany legal 06-15"},{name:"Moderna",status:"none",role:"No Germany results 06-15"},{name:"CSL Behring",status:"none",role:"US only 06-15"},{name:"Amgen",status:"none",role:"No Germany legal 06-15"},{name:"Eli Lilly",status:"none",role:"No Germany legal 06-15"},{name:"Gilead",status:"dead",role:"Senior Legal Counsel Germany - BOTH URLs dead 06-15"},{name:"Ipsen",status:"dead",role:"Legal Counsel DACH R-14802 dead 06-15"},{name:"Novo Nordisk",status:"none",role:"No Germany legal confirmed"},{name:"Bayer",status:"none",role:"Labor law Leverkusen - dealbreaker"},{name:"Teva",status:"none",role:"No confirmed Germany legal"},{name:"Stada",status:"none",role:"No legal roles 06-15"},{name:"Siemens Healthineers",status:"none",role:"US portal only"}];
const SCRAPE_HEALTH=[{source:"Glassdoor",queries:4,raw:0,scored:0,verified:0,dead:0,notes:"0 results all 4 queries"},{source:"LinkedIn",queries:4,raw:26,scored:1,verified:0,dead:0,notes:"FUTRUE mid-level 2-3 year req is dealbreaker"},{source:"StepStone",queries:3,raw:0,scored:0,verified:0,dead:0,notes:"396s ran 0 items"},{source:"Indeed",queries:2,raw:54,scored:0,verified:0,dead:0,notes:"US results only"},{source:"XING*,queries:2,raw:88,scored:0,verified:0,dead:0,notes:"Lawfirms machinery banking no pharma inhouse"},{source:"Arbeitsagentur",queries:2,raw:0,scored:0,verified:0,dead:0,notes:"0 results"},{source:"Workday 10 companies",queries:10,raw:"80",scored:0,verified:0,dead:0,notes:"BMS Merck failed. Pfizer India CSL US Roche Takeda Moderna Amgen no DE legal"},{source:"WebSearch Direct",queries:13,raw:15,scored:3,verified:0,dead:3,notes:"Ipsen R-14802 expired Gilead R0043703 dead Gilead R0012289 dead ITM excluded"}];
let activeFilter="all";
function renderMeta(){document.getElementById("lastScanBadge").textContent="Last scan: sCAU_META.lastScan;document.getElementById("cntA").textContent=JOBS.filter(j=>j.grade=="A").length;document.getElementById("cntB").textContent=JOBS.filter(j=>j.grade=="B").length;document.getElementById("cntC").textContent=JOBS.filter(j=>j.grade=="C").length;document.getElementById("cntDead").textContent=SCAN_META.deadLinks;document.getElementById("estCost").textContent="$"+SCAN_META.estCostUSD.toFixed(2);if(SCAN_META.noNewMatches){const n=document.getElementById("scanNotice");n.style.display="block";n.textContent=%CAN_META.noMatchNote}}
function renderJobs(){const l=document.getElementById("jobsList");l.innerHTML="<p style='padding:20px;color:#888;font-size:13px'>No new verified listings today. See prior scan results in Cowork artifact.</p>"}
function renderDream(){const g=document.getElementById("dreamGrid");DREAM_COMPANIES.forEach(d=>{const c=document.createElement("div");c.className="dream-card";const sc=d.status==="active"?"active":d.status==="dead"?"dead":"none";const st=d.status==="active"?"Role open":d.status==="dead"?"Just closed":"No role";c.innerHTML=`<div class="dream-name">${d.name}</div><div class="dream-status ${sc}">${st}</div>${d.role?`<div style="font-size:11px;color:#999">${d.role}</div>`:""}`;g.appendChild(c)})}
function renderHHealth(){const b=document.getElementById("healthBody");SCRAPER_HEALTH.forEach(h=>{const r=document.createElement("tr");r.innerHTML=f<td><strong>${h.source}</strong></td><td>${h.queries}</td><td>${h.raw}</td><td>${h.scored}</td><td>${h.verified>0?"heck "+h.verified:"0"}</td><td>${h.dead>0?"Dead "+h.dead:"0"}</td><td style="font-size:11px">${h.notes}</td></tr>`;b.appendChild(r)})}
function filterJobs(g,e){activeFilter=g;document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));if(e&&e.target)e.target.classList.add("active");renderJobs()}
renderMeta();renderJobs();renderDream();renderHealth();
</script>
</body>
</html>
