const result = await (async () => {
  const getResp = await fetch(BASE_URL, { headers: { Authorization: `Bearer ${TOKEN}` } });
  const getData = await getResp.json();
  const sha = getData.sha || '';
  const putResp = await fetch(BASE_URL, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: `Job scan update ${new Date().toISOString().slice(0,10)}`, content: BASE64_CONTENT.slice(0, 50) + '...[truncated]', sha })
  });
  return `sha=${sha} status=${putResp.status}`;
})();
