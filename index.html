const TODAY = "2026-06-08";

// ─── RENDER ──────────────────────────────────────────────────────────────────
let activeFilter = 'all';

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderJobs();
}

function renderScanMeta() {
  const m = SCAN_META;
  document.getElementById('scanMetaBar').innerHTML =
    `<span>Last scan: <strong>${m.lastScan}</strong></span>` +
    `<span>Scraped: <strong>${m.totalScraped}</strong></span>` +
    `<span>Verified live: <strong>${m.passedVerification}</strong></span>` +
    `<span>Dead links found: <strong>${m.deadLinks}</strong></span>` +
    `<span>Est. cost: <strong>$${m.estCostUSD.toFixed(2)}</strong></span>` +
    `<span>Sources: <strong>${m.sources.join(', ')}</strong></span>`;
}

function renderStats() {
  const counts = { A: 0, B: 0, C: 0 };
  const live = JOBS.filter(j => !j.dead);
  live.forEach(j => counts[j.grade] = (counts[j.grade]||0) + 1);
  const total = live.length;
  const scans = [...new Set(JOBS.map(j => j.scanDate))];
  const latest = scans.sort().at(-1);
  const newToday = JOBS.filter(j => j.scanDate === TODAY && !j.dead).length;
  const deadCount = JOBS.filter(j => j.dead).length;

  document.getElementById('lastScan').textContent = 'Last scan: ' + (latest || '—');

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-pill"><span class="dot-all"></span> <strong>${total}</strong> live listings</div>
    <div class="stat-pill"><span class="dot-a"></span> <strong>${counts.A||0}</strong> A-grade</div>
    <div class="stat-pill"><span class="dot-b"></span> <strong>${counts.B||0}</strong> B-grade</div>
    <div class="stat-pill"><span class="dot-c"></span> <strong>${counts.C||0}</strong> C-grade</div>
    <div class="stat-pill">🆕 <strong>${newToday}</strong> new today</div>
    <div class="stat-pill">☠️ <strong>${deadCount}</strong> dead</div>
    <div class="stat-pill">📅 <strong>${scans.length}</strong> scan${scans.length !== 1 ? 's' : ''} run</div>
  `;
}

function renderJobs() {
  const grid = document.getElementById('jobsGrid');
  let filtered;
  if (activeFilter === 'all') filtered = JOBS.filter(j => !j.dead);
  else if (activeFilter === 'new') filtered = JOBS.filter(j => j.scanDate === TODAY && !j.dead);
  else if (activeFilter === 'dead') filtered = JOBS.filter(j => j.dead);
  else filtered = JOBS.filter(j => j.grade === activeFilter && !j.dead);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">No listings for this filter.</div>';
    return;
  }

  grid.innerHTML = filtered.map(job => `
    <div class="job-card${job.dead ? ' dead' : ''}" data-grade="${job.grade}">
      <div class="card-top">
        <div class="card-left">
          <div class="role-title">${job.title}${job.dreamCompany ? ' ⭐' : ''}</div>
          <div class="company">${job.company}</div>
        </div>
        <div class="card-right">
          ${job.dead
            ? '<span class="dead-badge">☠️ Dead</span>'
            : `<span class="grade-badge grade-${job.grade}">${job.grade}-Grade</span>`
          }
          ${job.url && !job.dead
            ? `<a class="apply-btn" href="${job.url}" target="_blank">Apply →</a>`
            : `<span class="apply-btn no-url">Apply →</span>`
          }
        </div>
      </div>
      <div class="card-meta">
        <span class="meta-tag">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 8.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" fill="currentColor"/><path d="M8 1a6 6 0 00-6 6c0 3.314 5.25 8 6 8s6-4.686 6-8a6 6 0 00-6-6z" stroke="currentColor" stroke-width="1.4"/></svg>
          ${job.location}
        </span>
        ${job.hybrid ? '<span class="meta-tag">🏠 Hybrid</span>' : ''}
        <span class="meta-tag">${job.source}</span>
        ${job.scanDate === TODAY ? '<span class="new-tag">🆕 New today</span>' : '<span class="scan-tag">' + job.scanDate + '</span>'}
      </div>
      ${job.notes ? `<div class="card-notes">${job.notes}</div>` : ''}
    </div>
  `).join('');
}

function renderDreamCompanies() {
  document.getElementById('dreamGrid').innerHTML = DREAM_COMPANIES.map(c => `
    <div class="dream-pill ${c.hit ? 'hit' : ''}">
      <span class="status-dot"></span>
      ${c.name}
    </div>
  `).join('');
}

function renderFooter() {
  const scans = [...new Set(JOBS.map(j => j.scanDate))].sort();
  document.getElementById('footer').innerHTML =
    `Scan history: ${scans.join(' · ')} · Updated automatically by Kleen Hub Job Scan Agent`;
}

renderScanMeta();
