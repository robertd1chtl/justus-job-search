<!DOCTYPE html><script type="application/json" id="cowork-artifact-meta">
{
  "name": "Justus Job Board",
  "schemaVersion": 1,
  "description": "Justus Stähle's live job board — all scan results across runs, filterable by grade, with dream company monitor. Updated automatically each time the job scan runs."
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Justus — Job Board</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f9f9f8;
    color: #1a1a1a;
    padding: 24px 20px 48px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    margin-bottom: 28px;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 6px;
  }
  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: #111;
  }
  .last-scan {
    font-size: 12px;
    color: #888;
    background: #f0f0ee;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .mode-badge {
    font-size: 11px;
    font-weight: 600;
    color: #7c3aed;
    background: #f3f0ff;
    border: 1px solid #ddd6fe;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.2px;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
  }

  /* Stats row */
  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #fff;
    border: 1px solid #e8e8e5;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    color: #444;
  }
  .stat-pill strong { font-weight: 600; color: #111; }
  .dot-a { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .dot-b { width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; flex-shrink: 0; }
  .dot-c { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; }
  .dot-all { width: 8px; height: 8px; border-radius: 50%; background: #a1a1aa; flex-shrink: 0; }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #e0e0db;
    background: #fff;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: #555;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #bbb; color: #222; }
  .filter-btn.active {
    background: #1a1a1a;
    color: #fff;
    border-color: #1a1a1a;
  }

  /* Job cards */
  .jobs-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .job-card {
    background: #fff;
    border: 1px solid #e8e8e5;
    border-radius: 10px;
    padding: 16px 18px;
    transition: box-shadow 0.15s;
  }
  .job-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .job-card.hidden { display: none; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
  }
  .card-left { flex: 1; min-width: 0; }
  .card-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .role-title {
    font-size: 14px;
    font-weight: 600;
    color: #111;
    line-height: 1.4;
    margin-bottom: 3px;
  }
  .company {
    font-size: 13px;
    color: #555;
    font-weight: 500;
  }

  .grade-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 5px;
    letter-spacing: 0.3px;
  }
  .grade-A { background: #dcfce7; color: #15803d; }
  .grade-B { background: #dbeafe; color: #1d4ed8; }
  .grade-C { background: #fef3c7; color: #b45309; }

  .apply-btn {
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 6px;
    text-decoration: none;
    background: #f4f4f2;
    color: #333;
    border: 1px solid #e0e0db;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .apply-btn:hover { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .apply-btn.no-url { opacity: 0.4; pointer-events: none; }

  .card-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .meta-tag {
    font-size: 11.5px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .meta-tag svg { opacity: 0.5; }

  .card-notes {
    margin-top: 9px;
    font-size: 12px;
    color: #666;
    line-height: 1.6;
    border-top: 1px solid #f0f0ee;
    padding-top: 9px;
  }

  .scan-tag {
    font-size: 11px;
    background: #f4f4f2;
    color: #999;
    padding: 2px 7px;
    border-radius: 4px;
  }

  .new-tag {
    font-size: 11px;
    background: #fef9c3;
    color: #854d0e;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
  }

  /* Dream company section */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #aaa;
    margin: 28px 0 10px;
  }
  .dream-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 8px;
  }
  .dream-pill {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid #e8e8e5;
    background: #fff;
    color: #555;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .dream-pill.hit { border-color: #bbf7d0; background: #f0fdf4; color: #15803d; font-weight: 500; }
  .dream-pill .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #d1d5db; }
  .dream-pill.hit .status-dot { background: #22c55e; }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: #bbb; font-size: 14px; }

  /* Footer */
  .footer {
    margin-top: 36px;
    font-size: 11.5px;
    color: #bbb;
    text-align: center;
  }
</style>
</head>

  <div class="subtitle">Munich · Head/Director/Lead · Operations, Process, Transformation · €120k+</div>
</div>

<div class="stats" id="statsRow"></div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all')">All</button>
  <button class="filter-btn" onclick="setFilter('A')">🟢 A-Grade</button>
  <button class="filter-btn" onclick="setFilter('B')">🔵 B-Grade</button>
  <button class="filter-btn" onclick="setFilter('C')">🟡 C-Grade</button>
  <button class="filter-btn" onclick="setFilter('new')">🆕 New Today</button>
</div>

<div class="jobs-grid" id="jobsGrid"></div>

<div class="section-label">Dream Company Monitor</div>
<div class="dream-grid" id="dreamGrid"></div>

<div class="footer" id="footer"></div>
