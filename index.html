  const el = document.getElementById('metaBar');
  el.innerHTML = `
    <span>Scanned <strong>${SCAN_META.scanDate}</strong></span>
    <span>${SCAN_META.sourcesCount} sources, ${SCAN_META.scrapersRun} scrapers</span>
    <span>${SCAN_META.rawListings} raw &rarr; <strong>${SCAN_META.scoredListings} scored</strong></span>
    <span style="color:var(--grade-a-text)">${SCAN_META.gradeA} A-grade</span>
    <span style="color:var(--grade-b-text)">${SCAN_META.gradeB} B-grade</span>
    <span style="color:var(--grade-c-text)">${SCAN_META.gradeC} C-grade</span>
  `;
}

let activeFilter = 'all';

function renderFilters() {
  const el = document.getElementById('filters');
  const filters = [
    { key: 'all', label: 'All' },
    { key: 'A', label: 'A-Grade' },
    { key: 'B', label: 'B-Grade' },
    { key: 'C', label: 'C-Grade' },
    { key: 'dream', label: 'Dream Companies' }
  ];
  el.innerHTML = filters.map(f =>
    `<button class="filter-btn ${activeFilter === f.key ? 'active' : ''}" data-filter="${f.key}">${f.label}</button>`
  ).join('');

  el.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.filter;
      renderFilters();
      renderJobs();
    });
  });
}

function renderJobs() {
  const el = document.getElementById('jobList');
  let filtered = JOBS;
  if (activeFilter === 'dream') {
    filtered = JOBS.filter(j => j.dreamCompany);
  } else if (activeFilter !== 'all') {
    filtered = JOBS.filter(j => j.grade === activeFilter);
  }

  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">No listings match this filter.</div>';
    return;
  }

  const grades = ['A', 'B', 'C'];
  const gradeLabels = { A: 'A-Grade — Apply Immediately', B: 'B-Grade — Strong', C: 'C-Grade — Worth a Look' };

  let html = '';
  for (const g of grades) {
    const items = filtered.filter(j => j.grade === g);
    if (items.length === 0) continue;
    html += `<div class="grade-section">`;
    html += `<div class="grade-header">${gradeLabels[g]}</div>`;
    for (const job of items) {
      html += renderCard(job);
    }
    html += `</div>`;
  }
  el.innerHTML = html;
}

function renderCard(job) {
  const badgeClass = { A: 'badge-a', B: 'badge-b', C: 'badge-c' }[job.grade];
  const dreamBadge = job.dreamCompany ? `<span class="badge badge-dream">Dream Company</span>` : '';
  const salaryHtml = job.salary ? `<span>${job.salary}</span>` : '';

  return `
    <div class="job-card">
      <div class="job-card-top">
        <div>
          <div class="job-card-title">${job.title}</div>
          <div class="job-card-company">${job.company}</div>
        </div>
        <div class="badges">
          <span class="badge ${badgeClass}">${job.grade}</span>
          ${dreamBadge}
        </div>
      </div>
      <div class="job-meta">
        <span>${job.location}</span>
        <span>${job.source}</span>
        ${salaryHtml}
      </div>
      <div class="job-notes">${job.notes}</div>
      <a class="apply-link" href="${job.url}" target="_blank" rel="noopener">View Listing &rarr;</a>
    </div>
  `;
}

function renderDream() {
  const grid = document.getElementById('dreamGrid');
  grid.innerHTML = DREAM_COMPANIES.map(dc => `
    <div class="dream-chip ${dc.hit ? 'hit' : ''}">
      <span class="indicator"></span>
      <span>${dc.name}</span>
    </div>
  `).join('');
}

function renderHealth() {
  const rows = document.getElementById('healthRows');
  const statusIcon = { ok: '<span class="status-ok">&#10003;</span>', warn: '<span class="status-warn">&#9679;</span>', fail: '<span class="status-fail">&#10007;</span>' };
  rows.innerHTML = SCRAPER_HEALTH.map(s => `
    <tr>
      <td style="font-weight:500">${s.source}</td>
      <td style="color:var(--text-secondary);font-size:12px">${s.actor}</td>
      <td>${s.queries}</td>
      <td>${statusIcon[s.status] || s.status}</td>
      <td>${s.items !== null ? s.items : '—'}</td>
      <td style="color:var(--text-secondary)">${s.notes}</td>
    </tr>
  `).join('');

  const toggle = document.getElementById('healthToggle');
  const body = document.getElementById('healthBody');
  toggle.addEventListener('click', () => {
    toggle.classList.toggle('open');
    body.classList.toggle('open');
  });
}

renderMeta();
renderFilters();
renderJobs();
renderDream();
renderHealth();
</script>
</body>
</html>
